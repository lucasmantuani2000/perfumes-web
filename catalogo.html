<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="img/logo2.png?v=3">
  <link rel="shortcut icon" type="image/png" href="img/logo2.png?v=3">
  <title>Catálogo | Perfumesbuuy</title>
  <link rel="stylesheet" href="css/style.css" />
  
</head>
<body>

  <header class="header">
    <a href="index.html" class="logo">
    <img src="img/logo.jpeg" alt="Logo Perfumesbuuy">
    <span>Perfumesbuuy</span>
</a>

    <nav class="nav">
      <a href="index.html">Inicio</a>
      <a href="catalogo.html">Catálogo</a>
      <a href="ofertas.html">Ofertas</a>
      <a href="contacto.html">Contacto</a>
      
    </nav>
  </header>

  <main class="section">
    <h1>Catálogo</h1>
    <p class="section-text">Buscá tu perfume favorito y consultá disponibilidad.</p>

    <div class="filters">
      <input type="text" id="searchInput" placeholder="Buscar perfume..." />

      <div class="category-buttons">
        <button class="filter-btn active" data-category="Todos">Todos</button>
        <button class="filter-btn" data-category="Hombre">Hombre</button>
        <button class="filter-btn" data-category="Mujer">Mujer</button>
        <button class="filter-btn" data-category="Diseñador">Diseñador</button>
        <button class="filter-btn" data-category="Árabes">Árabes</button>
        <button class="filter-btn" data-category="Nicho">Nicho</button>
      </div>
      <div class="brand-filter">
        <label for="brandSelect">Marcas</label>

        <select id="brandSelect">
          <option value="Todas">Todas las marcas</option>
        </select>
      </div>
      </div>
    </div>

    <div class="product-grid" id="productGrid"></div>
  </main>

  <a 
  href="https://wa.me/59898303316?text=Hola,%20quiero%20consultar%20por%20un%20perfume" 
  class="whatsapp-float" 
  target="_blank"
>
  💬
</a>

  <footer class="footer">
    <p>© 2026 Perfumesbuuy</p>
  </footer>

  <script src="js/app.js"></script>
